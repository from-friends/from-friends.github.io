<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TezosTV LIVE</title>
  <script src="tezostv/js/qrcode.min.js"></script>
  <!-- NSFWJS v2.4.2 bundles TF.js internally, model files self-hosted -->
  <script src="tezostv/js/nsfwjs.min.js"></script>

  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 0;
      overflow: hidden;
    }

    .container {
      width: min(100%, 177.78vh);
      max-width: 1920px;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 2px solid #000;
      display: flex;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    }

    .left-section {
      flex: 0 0 60%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 2px solid #000;
      padding: 0;
      overflow: hidden;
    }

    .left-section img,
    .left-section video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .left-section video {
      display: block;
    }

    .right-section {
      flex: 0 0 40%;
      padding: 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .mint-label {
      display: inline-block;
      background: transparent;
      color: #2196F3;
      border: 2px solid #2196F3;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      width: fit-content;
      border-radius: 6px;
    }

    .mint-label.mint {
      color: #888888;
      border-color: #888888;
    }

    .mint-label.list {
      color: #2196F3;
      border-color: #2196F3;
    }

    .title {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin-top: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist {
      font-size: 1.5rem;
      color: #888;
      margin-top: 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .details {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 2px solid #000;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .detail-label {
      color: #666;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-value {
      font-size: 1.125rem;
      font-weight: 500;
    }

    .price {
      font-size: 2rem;
      font-weight: 700;
      color: #FF5722;
    }

    .qr-container {
      display: flex;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    #qrcode {
      background: #fff;
      padding: 0.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #qrcode:hover {
      opacity: 0.9;
    }

    #qrcode img {
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="left-section" id="mediaContainer">
      <img src="" alt="Artwork" id="artwork" style="display: none;">
      <video id="video" style="display: none;" autoplay loop muted playsinline></video>
    </div>

    <div class="right-section">
      <div class="content">
        <div>
          <div class="mint-label"></div>
          <div class="title" id="title">Loading...</div>
          <div class="artist" id="artist"></div>
        </div>

        <div class="details">
          <div class="detail-row">
            <span class="detail-label">Price</span>
            <span class="detail-value price" id="price"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">File Type</span>
            <span class="detail-value" id="fileType"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Editions</span>
            <span class="detail-value" id="editions"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Time</span>
            <span class="detail-value" id="time"></span>
          </div>
        </div>
      </div>

      <div class="qr-container">
        <div id="qrcode"></div>
      </div>
    </div>
  </div>

  <script>
    // Cache DOM elements
    const elements = {
      qrcode: document.getElementById("qrcode"),
      artwork: document.getElementById("artwork"),
      video: document.getElementById("video"),
      mediaContainer: document.getElementById("mediaContainer"),
      title: document.getElementById("title"),
      artist: document.getElementById("artist"),
      price: document.getElementById("price"),
      fileType: document.getElementById("fileType"),
      editions: document.getElementById("editions"),
      time: document.getElementById("time")
    };

    const API_ENDPOINT = 'https://data.objkt.com/v3/graphql';
    const REF_ID = '?ref=tz1cUtAZzDf4PmZHgtb2f22xkTRtaLYTufzA';
    let latestEvent = null;
    let updateInterval;

    // Helper functions
    function isCanvasSupported() {
      const elem = document.createElement('canvas');
      return !!(elem.getContext && elem.getContext('2d'));
    }

    // ── IPFS Multi-Gateway + objkt CDN Hybrid System ─────────────────
    const IPFS_GATEWAYS = [
      'https://ipfs.io/ipfs/',
      'https://w3s.link/ipfs/',
      'https://dweb.link/ipfs/',
      'https://nftstorage.link/ipfs/'
    ];

    function getIpfsHash(uri) {
      if (!uri) return null;
      if (uri.startsWith('ipfs://')) return uri.slice(7);
      return null;
    }

    function ipfsToHttp(uri, gatewayIndex) {
      if (!uri) return null;
      const hash = getIpfsHash(uri);
      if (hash) return IPFS_GATEWAYS[Math.min(gatewayIndex || 0, IPFS_GATEWAYS.length - 1)] + hash;
      return uri;
    }

    // objkt CDN – full-resolution artifact (best for 1080p display)
    function getObjktArtifactUrl(token) {
      if (!token?.fa_contract || !token?.token_id) return null;
      return `https://assets.objkt.media/file/assets-003/${token.fa_contract}/${token.token_id}/artifact`;
    }

    // objkt CDN – 400px thumbnail (fast for NSFW classification)
    function getObjktThumbUrl(token) {
      if (!token?.fa_contract || !token?.token_id) return null;
      return `https://assets.objkt.media/file/assets-003/${token.fa_contract}/${token.token_id}/thumb400`;
    }

    // Ordered display URLs: ipfs.io → objkt CDN artifact → other IPFS artifact gateways → IPFS thumbnail gateways
    function getDisplayUrls(token) {
      const urls = [];
      const artifactHash = getIpfsHash(token?.artifact_uri);

      // 1. First choice: ipfs.io
      if (artifactHash) urls.push(IPFS_GATEWAYS[0] + artifactHash);

      // 2. Second choice: objkt CDN
      const cdnUrl = getObjktArtifactUrl(token);
      if (cdnUrl) urls.push(cdnUrl);

      // 3. Third choices: Remaining IPFS gateways
      if (artifactHash) IPFS_GATEWAYS.slice(1).forEach(gw => urls.push(gw + artifactHash));
      else if (token?.artifact_uri) urls.push(token.artifact_uri);

      // 4. Last choices: Thumbnails
      const thumbHash = getIpfsHash(token?.thumbnail_uri);
      if (thumbHash) IPFS_GATEWAYS.forEach(gw => urls.push(gw + thumbHash));
      else if (token?.thumbnail_uri) urls.push(token.thumbnail_uri);

      return urls;
    }

    // Ordered classification URLs: objkt CDN thumb → IPFS thumbnail gateways
    function getClassificationUrls(token) {
      const urls = [];
      const cdnThumb = getObjktThumbUrl(token);
      if (cdnThumb) urls.push(cdnThumb);
      const thumbUri = token?.thumbnail_uri || token?.artifact_uri;
      const hash = getIpfsHash(thumbUri);
      if (hash) IPFS_GATEWAYS.forEach(gw => urls.push(gw + hash));
      else if (thumbUri) urls.push(thumbUri);
      return urls;
    }

    function formatTimeAgo(timestamp) {
      const diffMins = Math.floor((new Date - new Date(timestamp)) / 6e4);
      if (diffMins < 1) return "Just now";
      if (diffMins < 60) return `${diffMins}m ago`;
      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours}h ago`;
      return `${Math.floor(diffHours / 24)}d ago`;
    }

    function formatPrice(price) {
      if (!price) return null;
      return `${(price / 1e6).toFixed(2)} ꜩ`;
    }
    function getEventType(event) {
      return event.type || "list";
    }

    const NSFW_TAGS = ['nsfw', 'sexy', 'nude', 'naked', 'sex', 'porn', 'xxx', 'erotic', 'hentai', 'fetish', 'bdsm', 'gore', 'violence', 'bloody', 'adult', '18+'];
    const BLOCKED_HAZARDS = ['sexual', 'sensitive', 'violence', 'gore', 'medical', 'adult'];
    const BLACKLISTED_ADDRESSES = [
      'tz1NYosHyh53NP6q3z2SxaTBpkXiNqEmMuzg',
      'tz1UPKGL9TG6MxWGemSXNGL8zzV3HQM7NMrP'
    ];
    const BLACKLISTED_TITLE_KEYWORDS = ['NFTimbre'];

    function isNSFW(event) {
      const token = event.token;
      if (!token) return false;

      const tags = token.tags ? token.tags.map(t => t.tag.name) : [];
      const hazards = token.metadata?.accessibility?.hazards || [];

      // Check tags
      if (tags.some(t => NSFW_TAGS.includes(t.toLowerCase()))) {
        console.log(`Filtered NSFW (tag): ${token.name}`);
        return true;
      }

      // Check metadata hazards
      if (hazards.some(h => BLOCKED_HAZARDS.includes(h.toLowerCase()))) {
        console.log(`Filtered NSFW (hazard): ${token.name}`);
        return true;
      }

      return false;
    }

    function isBlacklisted(event) {
      const token = event.token;
      if (!token) {
        return false;
      }

      // Check all creators, not just the first one
      const creators = token.creators || [];

      // Check each creator's address
      for (const creator of creators) {
        const address = creator?.holder?.address;
        if (address) {
          // Trim whitespace and check against blacklist
          const trimmedAddress = address.trim();
          if (BLACKLISTED_ADDRESSES.includes(trimmedAddress)) {
            console.log(`Filtered blacklisted artist: ${token.name || 'Unknown'} (${trimmedAddress})`);
            return true;
          }
        }
      }

      // For listings, also check the seller address (person who listed it)
      if (event.type === 'list') {
        const sellerAddress = event.seller?.address;
        if (sellerAddress) {
          const trimmedAddress = sellerAddress.trim();
          if (BLACKLISTED_ADDRESSES.includes(trimmedAddress)) {
            console.log(`Filtered blacklisted seller: ${token.name || 'Unknown'} (${trimmedAddress})`);
            return true;
          }
        }
      }

      return false;
    }

    function hasBlacklistedTitle(event) {
      const token = event.token;
      if (!token || !token.name) {
        return false;
      }

      const title = token.name;
      // Check if title includes any blacklisted keywords (case-insensitive)
      for (const keyword of BLACKLISTED_TITLE_KEYWORDS) {
        if (title.toLowerCase().includes(keyword.toLowerCase())) {
          console.log(`Filtered blacklisted title: ${title} (contains "${keyword}")`);
          return true;
        }
      }

      return false;
    }

    // ── NSFWJS Image Classification ──────────────────────────────────
    let nsfwModel = null;
    const nsfwCache = new Map();

    // Max safety: very strict thresholds
    const NSFW_THRESHOLDS = {
      Porn: 0.10,
      Hentai: 0.10,
      Sexy: 0.20
    };

    async function loadNSFWModel(retries = 3) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          console.log(`Loading NSFW model (attempt ${attempt}/${retries})...`);
          // Race against a 30s timeout
          nsfwModel = await Promise.race([
            nsfwjs.load('tezostv/nsfw_model/'),
            new Promise((_, reject) => setTimeout(() => reject(new Error('Model load timeout')), 30000))
          ]);
          console.log('NSFW model loaded successfully');
          return;
        } catch (e) {
          console.error(`NSFW model load attempt ${attempt} failed:`, e.message);
          if (attempt < retries) {
            console.log('Retrying in 3 seconds...');
            await new Promise(r => setTimeout(r, 3000));
          }
        }
      }
      console.error('NSFW model failed to load after all retries. All artwork will be blocked (fail-closed).');
    }

    // Try loading an image from multiple URLs until one succeeds (CORS-enabled)
    async function loadImageForClassification(urls) {
      for (const url of urls) {
        try {
          const img = await new Promise((resolve, reject) => {
            const image = new Image();
            image.crossOrigin = 'anonymous';
            const timeout = setTimeout(() => reject(new Error('timeout')), 10000);
            image.onload = () => { clearTimeout(timeout); resolve(image); };
            image.onerror = () => { clearTimeout(timeout); reject(new Error('load failed')); };
            image.src = url;
          });
          console.log(`Classification image loaded from: ${url}`);
          return img;
        } catch (e) {
          console.log(`Classification source failed (${e.message}): ${url}`);
        }
      }
      throw new Error('All classification URLs failed');
    }

    async function isEventSFW(event) {
      // Fail-closed: no model = no show
      if (!nsfwModel) {
        console.warn('NSFW model not loaded, blocking artwork (fail-closed)');
        return false;
      }

      const token = event.token;
      if (!token) return false;

      // Cache by token identity, not URL
      const cacheKey = `${token.fa_contract}-${token.token_id}`;
      if (nsfwCache.has(cacheKey)) {
        return nsfwCache.get(cacheKey);
      }

      const classUrls = getClassificationUrls(token);
      if (classUrls.length === 0) return false;

      try {
        const img = await loadImageForClassification(classUrls);
        const predictions = await nsfwModel.classify(img);

        const scores = {};
        predictions.forEach(p => scores[p.className] = p.probability);

        const isUnsafe = Object.entries(NSFW_THRESHOLDS).some(
          ([category, threshold]) => (scores[category] || 0) > threshold
        );

        if (isUnsafe) {
          console.log(`🚫 NSFW BLOCKED: "${token.name}"`, scores);
        } else {
          console.log(`✅ SFW OK: "${token.name}"`, scores);
        }

        const isSafe = !isUnsafe;
        nsfwCache.set(cacheKey, isSafe);
        return isSafe;
      } catch (e) {
        console.error(`NSFW classification failed for "${token.name}", blocking (fail-closed):`, e.message);
        return false; // fail-closed
      }
    }

    async function fetchEvents() {
      const oneDayAgo = new Date(Date.now() - 864e5).toISOString();
      const mintQuery = `query GetMints {
        token(
          order_by: {timestamp: desc},
          limit: 10,
          where: {
            timestamp: {_gte: "${oneDayAgo}"},
            mime: {_in: ["image/png", "image/jpeg", "image/gif", "image/webp", "video/mp4"]}
          }
        ) {
          id: token_id
          type: __typename
          timestamp
          token_id
          fa_contract
          name
          thumbnail_uri
          artifact_uri
          mime
          supply
          creators {
            holder {
              alias
              address
            }
          }
          tags {
            tag {
              name
            }
          }
          metadata
        }
      }`;
      const listQuery = `query GetLists {
        listing(
          order_by: {timestamp: desc},
          limit: 10,
          where: {
            status: {_eq: "active"},
            timestamp: {_gte: "${oneDayAgo}"},
            token: {
              mime: {_in: ["image/png", "image/jpeg", "image/gif", "image/webp", "video/mp4"]}
            }
          }
        ) {
          id
          timestamp
          price
          amount
          seller {
            address
          }
          token {
            token_id
            fa_contract
            name
            thumbnail_uri
            artifact_uri
            mime
            supply
            creators {
              holder {
                alias
                address
              }
            }
            tags {
              tag {
                name
              }
            }
            metadata
          }
        }
      }`;

      try {
        const [mintResponse, listResponse] = await Promise.all([
          fetch(API_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              query: mintQuery
            })
          }),
          fetch(API_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              query: listQuery
            })
          })
        ]);

        const [mintData, listData] = await Promise.all([mintResponse.json(), listResponse.json()]);
        if (mintData.errors) throw new Error(mintData.errors[0].message);
        if (listData.errors) throw new Error(listData.errors[0].message);

        const mints = mintData.data.token.map(t => ({
          ...t,
          type: 'mint',
          token: t,
          id: `${t.fa_contract}-${t.token_id}`
        }));
        const lists = listData.data.listing.map(l => ({
          ...l,
          type: 'list'
        }));
        const allEvents = [...mints, ...lists].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        // Filter NSFW events, blacklisted artists, and blacklisted titles, then take top 5
        const filteredEvents = allEvents.filter(e => !isNSFW(e) && !isBlacklisted(e) && !hasBlacklistedTitle(e)).slice(0, 5);

        return filteredEvents.map(event => {
          const amount = event.type === 'mint' ? event.supply : event.amount;
          return {
            id: event.id,
            type: event.type,
            timestamp: event.timestamp,
            token: event.token,
            price: event.price,
            amount: amount
          };
        });
      } catch (error) {
        console.error('Error fetching events:', error);
        throw error;
      }
    }

    function updateContent(event) {
      if (!event) return;

      const eventType = getEventType(event);
      const tokenName = event.token?.name || 'Untitled';
      const creatorAlias = event.token?.creators?.[0]?.holder?.alias || event.token?.creators?.[0]?.holder?.address?.substring(0, 8) || 'Unknown';
      const price = formatPrice(event.price);
      const timeAgo = formatTimeAgo(event.timestamp);
      const amount = event.amount;
      const displayUrls = getDisplayUrls(event.token);
      const mimeType = event.token?.mime;
      const isVideo = mimeType && mimeType.startsWith('video/');
      const tokenUrl = event.token?.fa_contract && event.token?.token_id ?
        `https://objkt.com/tokens/${event.token.fa_contract}/${event.token.token_id}${REF_ID}` : '#';

      // Update basic fields
      elements.title.textContent = tokenName;
      elements.artist.textContent = `by ${creatorAlias}`;
      elements.price.textContent = price || 'TBA';
      elements.time.textContent = timeAgo;
      elements.editions.textContent = amount || 'TBA';
      // Clean up mime type string
      elements.fileType.textContent = mimeType ? mimeType.replace('image/', '').replace('video/', '').toUpperCase() : 'TBA';

      // Update Mint/List label
      const mintLabel = document.querySelector('.mint-label');
      if (mintLabel) {
        mintLabel.textContent = eventType;
        mintLabel.classList.remove('mint', 'list');
        mintLabel.classList.add(eventType);
      }

      // Handle Media – multi-gateway fallback for reliable loading
      if (displayUrls.length === 0) return;

      if (isVideo) {
        let vidIdx = 0;
        elements.video.onerror = () => {
          vidIdx++;
          if (vidIdx < displayUrls.length) {
            console.log(`Video failed, trying source ${vidIdx + 1}/${displayUrls.length}`);
            elements.video.src = displayUrls[vidIdx];
            elements.video.load();
          } else {
            console.error('All video sources failed for:', event.token?.name);
          }
        };
        elements.video.src = displayUrls[0];
        elements.video.style.display = "block";
        elements.artwork.style.display = "none";
        elements.video.load();
        elements.video.play().catch(e => console.log("Video autoplay prevented:", e));
      } else {
        let imgIdx = 0;
        elements.artwork.onerror = () => {
          imgIdx++;
          if (imgIdx < displayUrls.length) {
            console.log(`Image failed, trying source ${imgIdx + 1}/${displayUrls.length}`);
            elements.artwork.src = displayUrls[imgIdx];
          } else {
            console.error('All image sources failed for:', event.token?.name);
          }
        };
        elements.artwork.src = displayUrls[0];
        elements.artwork.style.display = "block";
        elements.video.style.display = "none";
        // Reset video to stop audio if it was playing
        elements.video.pause();
        elements.video.src = "";
      }

      // Handle QR Code
      elements.qrcode.innerHTML = '';
      if (tokenUrl !== '#') {
        // Route through marketplace.html
        const marketplaceUrl = `https://from-friends.github.io/marketplace.html?url=${encodeURIComponent(tokenUrl)}`;

        new QRCode(elements.qrcode, {
          text: marketplaceUrl,
          width: 120,
          height: 120,
          colorDark: "#000",
          colorLight: "#fff",
          correctLevel: QRCode.CorrectLevel.L
        });

        // Update click listener
        elements.qrcode.onclick = () => window.open(marketplaceUrl, '_blank');
      }
    }

    async function loadEvents() {
      try {
        const events = await fetchEvents();
        if (events && events.length > 0) {
          // Iterate through events to find the first SFW one
          for (const event of events) {
            const safe = await isEventSFW(event);
            if (safe) {
              // Only update display if it's a different event
              if (!latestEvent || latestEvent.id !== event.id) {
                latestEvent = event;
                console.log('New safe event found:', latestEvent);
                updateContent(latestEvent);
              }
              return; // Found best safe event, done
            }
          }
          console.log('No SFW events found in this batch');
        } else {
          console.log('No events found');
        }
      } catch (error) {
        console.error('Error in loadEvents:', error);
      }
    }

    async function startApp() {
      // Load NSFW model first (fail-closed: nothing shows until model is ready)
      await loadNSFWModel();
      loadEvents();
      // Check for new events
      updateInterval = setInterval(loadEvents, 20000);
    }

    startApp();
  </script>
</body>

</html>
